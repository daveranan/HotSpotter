name: Phase 1 Native Lifecycle

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - run: npm ci
      - run: npm run check
      - run: npm run build:native
      - run: npm audit --audit-level=high
